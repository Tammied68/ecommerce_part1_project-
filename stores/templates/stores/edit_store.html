<!DOCTYPE html>
<html>
<head>
    <title>Edit Store</title>
</head>
<body>
    <h2>Edit Store</h2>

    <form method="post">
        {% csrf_token %}

        <p>
            <label for="name">Store Name:</label><br>
            <input type="text" name="name" id="name" value="{{ store.name }}" required>
        </p>

        <p>
            <label for="description">Description:</label><br>
            <textarea name="description" id="description" rows="4" cols="50" required>{{ store.description }}</textarea>
        </p>

        <button type="submit">Save Changes</button>
    </form>

    <p><a href="/stores/">Back to Stores</a></p>
</body>
</html>
