<form method="post" action="{% url 'login' %}">
    {% csrf_token %}

    <p>
        <label>Username:</label>
        <input type="text" name="username" required>
    </p>

    <p>
        <label>Password:</label>
        <input type="password" name="password" required>
    </p>

    <button type="submit">Login</button>
</form>
